repos:
  # === PRE-COMMIT STAGE (quick checks on every commit) ===

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # === PRE-PUSH STAGE (full test suite before pushing) ===

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: poetry run pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  - repo: https://github.com/pycalendar/ai-prompt-auto-commit
    rev: v0.0.7
    hooks:
      - id: unstage-ai-prompts
      - id: append-ai-prompts
        stages: [prepare-commit-msg]
      - id: archive-ai-prompts
        stages: [post-commit]
      - id: prepare-ai-repository
        stages: [manual]
